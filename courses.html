let state = {query:'', field:'all', tag:'all', sort:'popular'};

const $search = document.getElementById('search-input');
const $clear = document.getElementById('clear-btn');
const $field = document.getElementById('filter-field');
const $sort = document.getElementById('filter-sort');
const $tags = document.getElementById('tag-filters');
const $grid = document.getElementById('courses-grid');
const $count = document.getElementById('count');

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function highlight(text, query) {
  const safe = escapeHtml(text);
  if (!query) return safe;
  const escapedQuery = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const regex = new RegExp(`(${escapedQuery})`, 'gi');
  return safe.replace(regex, '<mark>$1</mark>');
}

function getFiltered() {
  let result = [...COURSES];

  if (state.query) {
    const q = state.query.toLowerCase();
    result = result.filter(c =>
      c.title.toLowerCase().includes(q) ||
      c.uni.toLowerCase().includes(q) ||
      c.dept.toLowerCase().includes(q) ||
      c.keywords.toLowerCase().includes(q)
    );
  }
  if (state.field !== 'all') result = result.filter(c => c.field === state.field);
  if (state.tag !== 'all') result = result.filter(c => c.tags.includes(state.tag));

  switch (state.sort) {
    case 'newest': result.sort((a,b) => b.newness - a.newness); break;
    case 'rating': result.sort((a,b) => b.rating - a.rating); break;
    case 'students': result.sort((a,b) => b.students - a.students); break;
    default: result.sort((a,b) => (b.rating * Math.log10(b.students)) - (a.rating * Math.log10(a.students)));
  }
  return result;
}

function render() {

  $count.classList.add('updated');
  setTimeout(() => $count.classList.remove('updated'), 400);

  if (courses.length === 0) {
    $grid.innerHTML = `
      <div class="empty">
        <div class="empty-ico">🔍</div>
        <h3>검색 결과가 없습니다</h3>
        <p>${state.query ? `'<strong>${escapeHtml(state.query)}</strong>'에 해당하는 강좌를 찾지 못했어요.<br>` : ''}다른 키워드로 검색하거나 필터를 초기화해보세요.</p>
        <button onclick="resetFilters()">필터 초기화</button>
      </div>`;
    return;
  }

  $grid.innerHTML = courses.map(c => `
    <article class="course">
      <div class="course-img ${c.gradient}">
        <div class="pattern"></div>
        <span class="badge">${escapeHtml(c.badge)}</span>
      </div>
      <div class="course-body">
        <div class="course-uni">${escapeHtml(c.uni)} · ${escapeHtml(c.dept)}</div>
        <div class="course-title">${highlight(c.title, state.query)}</div>
        <div class="course-meta">
          <span>⭐ ${c.rating}</span>
          <span>👥 ${c.students.toLocaleString()}명</span>
          ${c.tags.includes('수료증') ? '<span>🎓 수료증</span>' : ''}
        </div>
      </div>
    </article>
  `).join('');
}

function resetFilters() {
  state = {query:'', field:'all', tag:'all', sort:'popular'};
  $search.value = '';
  $field.value = 'all';
  $sort.value = 'popular';
  $clear.classList.remove('show');
  document.querySelectorAll('#tag-filters .chip').forEach(c => c.classList.toggle('active', c.dataset.tag === 'all'));
  render();
}

let searchTimer;
$search.addEventListener('input', e => {
  state.query = e.target.value.trim();
  $clear.classList.toggle('show', state.query.length > 0);
  clearTimeout(searchTimer);
  searchTimer = setTimeout(render, 150);
});

$clear.addEventListener('click', () => {
  $search.value = '';
  state.query = '';
  $clear.classList.remove('show');
  render();
  $search.focus();
});

$field.addEventListener('change', e => { state.field = e.target.value; render(); });
$sort.addEventListener('change', e => { state.sort = e.target.value; render(); });

$tags.addEventListener('click', e => {
  const btn = e.target.closest('button[data-tag]');
  if (!btn) return;
  document.querySelectorAll('#tag-filters .chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  state.tag = btn.dataset.tag;
  render();
});

render();
</script>

</body>
</html>
